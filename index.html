<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><title>بابا جودة | لوحة التراخيص السحابية</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>body { font-family: Tahoma; background: #f8f9fa; }</style>
</head>
<body>
<div class="container-fluid mt-4 px-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="text-primary fw-bold m-0">☁️ إدارة تراخيص الفروع</h3>
    <button class="btn btn-primary shadow-sm" onclick="loadData()">🔄 تحديث القائمة</button>
  </div>
  <div class="card shadow-sm border-0"><div class="card-body p-0">
      <table class="table table-hover text-center align-middle m-0" style="font-size: 0.9rem;">
        <thead class="table-dark">
          <tr><th>كود المازر بورد</th><th>كود الدعم</th><th>المؤسسة</th><th>المدير</th><th>التليفون</th><th>قاعدة البيانات</th><th>الحالة</th><th>الإجراءات السريعة</th></tr>
        </thead>
        <tbody id="clientsTable"><tr><td colspan="8" class="p-4 fw-bold">جاري الاتصال... ⏳</td></tr></tbody>
      </table>
  </div></div>
</div>

<script>
  // حط رابط جوجل بتاعك هنا !!!!!!!!
  const API_URL = "https://script.google.com/macros/s/AKfycbzME7OstXoYpmqiZtlwmWkJmjzux2nHyR0C7nAn8nDn9SDeLP21idlqJ0r28ikzSSTY/exec";

  async function loadData() {
    document.getElementById('clientsTable').innerHTML = '<tr><td colspan="8" class="p-4 fw-bold">جاري سحب البيانات... ⏳</td></tr>';
    try {
      const response = await fetch(API_URL + "?action=get_all");
      const data = await response.json();
      let html = '';
      if(data.length === 0) { html = '<tr><td colspan="8" class="p-4">لا يوجد أجهزة.</td></tr>'; } 
      else {
          data.forEach(c => {
            let badge = '';
            if(c.status === 'active') badge = '<span class="badge bg-success">دائم</span>';
            else if(c.status === 'trial') badge = '<span class="badge bg-info text-dark">تجريبي</span>';
            else if(c.status === 'pending') badge = '<span class="badge bg-warning text-dark">منتظر</span>';
            else badge = '<span class="badge bg-danger">موقوف 🚫</span>';

            html += `<tr>
                <td dir="ltr" class="fw-bold text-secondary" style="font-size:0.8rem;">${c.hwid}</td>
                <td class="fw-bold text-danger">${c.support_code || '-'}</td>
                <td class="fw-bold">${c.company || '-'}</td>
                <td>${c.manager || '-'}</td><td dir="ltr">${c.phone || '-'}</td><td dir="ltr">${c.db_name || '-'}</td>
                <td>${badge}<br><small dir="ltr" class="text-muted">${c.expiry || ''}</small></td>
                <td>
                  <button class="btn btn-sm btn-outline-success m-1" onclick="updateStatus('${c.hwid}', 'active')">✔️</button>
                  <button class="btn btn-sm btn-outline-info m-1" onclick="updateStatus('${c.hwid}', 'trial')">⏳</button>
                  <button class="btn btn-sm btn-outline-danger m-1" onclick="updateStatus('${c.hwid}', 'blocked')">🚫</button>
                </td>
              </tr>`;
          });
      }
      document.getElementById('clientsTable').innerHTML = html;
    } catch (e) { document.getElementById('clientsTable').innerHTML = '<tr><td colspan="8" class="text-danger p-4">❌ خطأ في الاتصال!</td></tr>'; }
  }

  async function updateStatus(hwid, newStatus) {
    if(!confirm('تأكيد تغيير حالة الترخيص؟')) return;
    document.body.style.cursor = 'wait';
    try {
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ hwid: hwid, status: newStatus }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
      loadData();
    } catch (e) { alert('❌ حدث خطأ.'); } finally { document.body.style.cursor = 'default'; }
  }
  window.onload = loadData;
</script>
</body>
</html>

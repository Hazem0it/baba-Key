<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>بابا جودة | لوحة التراخيص السحابية</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>body { font-family: Tahoma; background: #f8f9fa; }</style>
</head>
<body>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold m-0">☁️ إدارة تراخيص الفروع (جوجل سيرفر)</h2>
    <button class="btn btn-primary shadow-sm" onclick="loadData()">🔄 تحديث القائمة</button>
  </div>
  
  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <table class="table table-hover text-center align-middle m-0">
        <thead class="table-dark">
          <tr>
            <th>كود المازر بورد</th>
            <th>اسم المؤسسة</th>
            <th>الحالة</th>
            <th>تاريخ الانتهاء</th>
            <th>مفتاح الأوفلاين</th>
            <th>الإجراءات السريعة</th>
          </tr>
        </thead>
        <tbody id="clientsTable">
          <tr><td colspan="6" class="p-4 fw-bold">جاري الاتصال بسيرفرات جوجل... ⏳</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // رابط جوجل بتاعك
  const API_URL = "https://script.google.com/macros/s/AKfycbz93pNJMxiCZnIk3_qLZNNYcbROxny5Q2AlNdfDwx1YUVshyuBydMgk8fG0A8nNCgkW/exec";

  async function loadData() {
    document.getElementById('clientsTable').innerHTML = '<tr><td colspan="6" class="p-4 fw-bold text-primary">جاري سحب البيانات... ⏳</td></tr>';
    try {
      const response = await fetch(API_URL + "?action=get_all");
      const data = await response.json();
      let html = '';
      
      if(data.length === 0) {
          html = '<tr><td colspan="6" class="p-4">لا يوجد أي أجهزة مسجلة حتى الآن.</td></tr>';
      } else {
          data.forEach(client => {
            let badge = '';
            if(client.status === 'active') badge = '<span class="badge bg-success fs-6">مفعل دائم</span>';
            else if(client.status === 'trial') badge = '<span class="badge bg-info text-dark fs-6">تجريبي 14 يوم</span>';
            else if(client.status === 'pending') badge = '<span class="badge bg-warning text-dark fs-6">منتظر التفعيل</span>';
            else badge = '<span class="badge bg-danger fs-6">موقوف 🚫</span>';

            html += `
              <tr>
                <td dir="ltr" class="fw-bold text-secondary">${client.hwid}</td>
                <td class="fw-bold">${client.company}</td>
                <td>${badge}</td>
                <td dir="ltr" class="fw-bold text-muted">${client.expiry || '---'}</td>
                <td dir="ltr" class="text-success fw-bold">${client.key || '---'}</td>
                <td>
                  <button class="btn btn-sm btn-outline-success fw-bold m-1" onclick="updateStatus('${client.hwid}', 'active')">✔️ دائم</button>
                  <button class="btn btn-sm btn-outline-info fw-bold m-1" onclick="updateStatus('${client.hwid}', 'trial')">⏳ تجريبي</button>
                  <button class="btn btn-sm btn-outline-danger fw-bold m-1" onclick="updateStatus('${client.hwid}', 'blocked')">🚫 إيقاف</button>
                </td>
              </tr>
            `;
          });
      }
      document.getElementById('clientsTable').innerHTML = html;
    } catch (error) {
      document.getElementById('clientsTable').innerHTML = '<tr><td colspan="6" class="text-danger p-4 fw-bold">❌ حدث خطأ في الاتصال بسيرفر جوجل!</td></tr>';
    }
  }

  async function updateStatus(hwid, newStatus) {
    if(!confirm('تأكيد تغيير حالة الترخيص لهذا الجهاز؟')) return;

    // تغيير شكل الزرار للمستخدم عشان يحس إن في تحميل
    document.body.style.cursor = 'wait';
    
    try {
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ hwid: hwid, status: newStatus }),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' } // Text/plain لتخطي حماية CORS
      });
      alert('✅ تم التحديث بنجاح! راجع جوجل شيت.');
      loadData();
    } catch (error) {
      alert('❌ حدث خطأ أثناء التحديث.');
    } finally {
      document.body.style.cursor = 'default';
    }
  }

  window.onload = loadData;
</script>

</body>
</html>
